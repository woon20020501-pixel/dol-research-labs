name: Whitepaper Verification

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest numpy scipy sympy pycryptodome argon2-cffi
      - name: Run verification suite (includes verification/legacy/ and polyvault_defi_sim.py)
        run: pytest verification/ -v --tb=short
      - name: Run PolyVault v3.2 DeFi reference oracle (standalone)
        run: python3 verification/polyvault_defi_sim.py
